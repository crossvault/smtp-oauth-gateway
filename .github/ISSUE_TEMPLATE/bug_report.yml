name: Bug report
description: Report a problem with SmtpGateway
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.

        **Never paste secrets.** Redact every `ClientSecret`, password, token,
        and any real tenant/mailbox data from configuration and logs before
        submitting. Issues are public.
  - type: input
    id: version
    attributes:
      label: Gateway version
      description: The release (ZIP) version you are running.
      placeholder: e.g. 0.3.1
    validations:
      required: true
  - type: input
    id: windows-version
    attributes:
      label: Windows version
      description: The Windows version the service runs on.
      placeholder: e.g. Windows Server 2022, Windows 11 23H2
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Outbound provider
      description: Which provider is configured?
      options:
        - GenericSmtp
        - M365Oauth
        - Graph
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: >
        Relevant configuration (e.g. from appsettings.json). REDACT ALL SECRETS -
        remove any ClientSecret, password, or token values before pasting.
      render: json
    validations:
      required: false
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What did you do, and what did you expect to happen versus what actually happened?
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log excerpt
      description: >
        Paste the relevant portion of the log. Double-check there are no secrets
        or message content in it before submitting.
      render: text
    validations:
      required: false
